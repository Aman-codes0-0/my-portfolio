<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Aman Kumar's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="shooting-stars-container">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <!-- Full-Screen Loader -->
    <div class="loader-wrapper" id="loader">
        <div class="loader-border">
            <div class="loader-core"></div>
        </div>
        <p class="loader-text">Loading...</p>
    </div>

    <div class="container" id="portfolio-content">
        <!-- Header Section -->
        <header class="header">
            <div class="logo">
                <h1>AMAN<span class="highlight-text">'S</span></h1>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                    <i class="fas fa-sun"></i>
                </button>
            </div>
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="main-nav" id="main-nav">
                <ul>
                    <li><a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a></li>
                    <li><a href="achievements.html" class="nav-item"><i class="fas fa-trophy"></i><span>ACHIEVEMENTS</span></a></li>
                    <li><a href="projects.html" class="nav-item" style="color: var(--text-color);"><i class="fas fa-magic" style="color: var(--accent-red); transform: translateY(-3px);"></i><span>PROJECTS</span></a></li>
                    <li><a href="contact.html" class="nav-item"><i class="fas fa-envelope"></i><span>CONTACT</span></a></li>
                    <li><a href="resume.html" class="nav-item"><i class="fas fa-file-invoice"></i><span>RESUME</span></a></li>
                    <li><a href="https://www.linkedin.com/in/aman-kumar-44b4183a0/" class="nav-item" target="_blank"><i class="fab fa-linkedin"></i><span>LINKEDIN</span></a></li>
                    <li><a href="https://github.com/Aman-codes0-0" class="nav-item" target="_blank"><i class="fab fa-github"></i><span>GITHUB</span></a></li>
                </ul>
            </nav>
        </header>

        <!-- Projects Page Content -->
        <section class="projects-page-content">
            <div class="section-header">
                <h2><i class="fas fa-code-branch"></i> All GitHub Projects</h2>
                <p style="margin-left: 1rem; color: var(--text-light); font-size: 0.9rem;">Automatically synced with my GitHub profile.</p>
            </div>

            <div class="projects-grid" id="all-github-projects">
                <!-- Loading State -->
                <div class="project-loader">
                    <div class="loader-border">
                        <div class="loader-core"></div>
                    </div>
                    <p>Fetching all projects from GitHub...</p>
                </div>
            </div>
        </section>

        <!-- Footer Section -->
        <footer>
            <p>&copy; 2026 Aman Kumar. Designed with aesthetics.</p>
        </footer>
    </div>

    <script>
        // Hamburger Menu Toggle
        const menuToggle = document.getElementById('menu-toggle');
        const mainNav = document.getElementById('main-nav');

        if (menuToggle && mainNav) {
            menuToggle.addEventListener('click', () => {
                menuToggle.classList.toggle('active');
                mainNav.classList.toggle('active');
                document.body.style.overflow = mainNav.classList.contains('active') ? 'hidden' : 'auto';
            });

            // Close menu when a nav item is clicked
            const navItems = mainNav.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    menuToggle.classList.remove('active');
                    mainNav.classList.remove('active');
                    document.body.style.overflow = 'auto';
                });
            });
        }

        // Theme Management
        const themeToggle = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
        }

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                theme = 'light';
                document.documentElement.removeAttribute('data-theme');
            } else {
                theme = 'dark';
                document.documentElement.setAttribute('data-theme', 'dark');
            }
            localStorage.setItem('theme', theme);
        });

        // Hide loader and fetch projects
        window.addEventListener('load', function () {
            setTimeout(function () {
                document.getElementById('loader').style.opacity = '0';
                document.getElementById('loader').style.pointerEvents = 'none';
            }, 500);
            
            fetchAllProjects();
        });

        const sliderStates = {};

        async function fetchAllProjects() {
            const container = document.getElementById('all-github-projects');
            const username = 'Aman-codes0-0';
            
            try {
                // Fetch all repositories (up to 100)
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`);
                if (!response.ok) throw new Error('GitHub API request failed');
                
                const repos = await response.json();
                const originalRepos = repos.filter(repo => !repo.fork);
                container.innerHTML = '';
                
                if (originalRepos.length === 0) {
                    container.innerHTML = '<p class="error-msg">No public repositories found.</p>';
                    return;
                }

                // Process each repo in parallel for README images
                const projectPromises = originalRepos.map(async (repo, index) => {
                    const card = document.createElement('div');
                    card.className = 'project-card glass-panel';
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    const colors = ['#319795', '#e53e3e', '#4fd1c5', '#f87171', '#6366f1', '#a855f7'];
                    const randomColor = colors[index % colors.length];
                    const ogImageUrl = `https://opengraph.githubassets.com/1/${username}/${repo.name}`;
                    
                    // Fetch images from README
                    let images = [ogImageUrl];
                    try {
                        const readmeResponse = await fetch(`https://api.github.com/repos/${username}/${repo.name}/readme`);
                        if (readmeResponse.ok) {
                            const readmeData = await readmeResponse.json();
                            const content = atob(readmeData.content);
                            const imgRegex = /(?:!\[.*?\]\((.*?)\)|<img.*?src=["'](.*?)["'])/g;
                            let match;
                            const extractedImages = [];
                            while ((match = imgRegex.exec(content)) !== null) {
                                let imgUrl = match[1] || match[2];
                                if (imgUrl && !imgUrl.startsWith('http')) {
                                    imgUrl = `https://raw.githubusercontent.com/${username}/${repo.name}/${repo.default_branch || 'main'}/${imgUrl.replace(/^\.\//, '')}`;
                                }
                                if (imgUrl && !imgUrl.includes('.svg')) {
                                    extractedImages.push(imgUrl);
                                }
                            }
                            if (extractedImages.length > 0) {
                                images = extractedImages.slice(0, 5);
                            }
                        }
                    } catch (e) {}

                    let langIcon = 'fa-code';
                    if (repo.language === 'Python') langIcon = 'fa-brands fa-python';
                    else if (repo.language === 'JavaScript') langIcon = 'fa-brands fa-js';
                    else if (repo.language === 'TypeScript') langIcon = 'fa-brands fa-js';
                    else if (repo.language === 'C++') langIcon = 'fa-solid fa-c';
                    else if (repo.language === 'HTML') langIcon = 'fa-brands fa-html5';
                    else if (repo.language === 'CSS') langIcon = 'fa-brands fa-css3-alt';

                    card.innerHTML = `
                        <div class="project-image" id="slider-${repo.id}">
                            <div class="slider-container">
                                ${images.map(img => `<div class="slide"><img src="${img}" alt="${repo.name}" onerror="this.src='${ogImageUrl}'"></div>`).join('')}
                            </div>
                            ${images.length > 1 ? `
                                <button class="slider-arrow arrow-prev" onclick="moveSlider('${repo.id}', -1)"><i class="fas fa-chevron-left"></i></button>
                                <button class="slider-arrow arrow-next" onclick="moveSlider('${repo.id}', 1)"><i class="fas fa-chevron-right"></i></button>
                                <div class="slider-dots">
                                    ${images.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="setSlider('${repo.id}', ${i})"></div>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                        <div class="project-content">
                            <h3>${repo.name}</h3>
                            <p class="client">${repo.description || 'Check out the repository for more details.'}</p>
                            <div class="project-stats">
                                <span><i class="fas fa-star"></i> ${repo.stargazers_count}</span>
                                <span><i class="fas fa-code-branch"></i> ${repo.forks_count}</span>
                                ${repo.language ? `<span><i class="${langIcon}" style="color: ${randomColor}"></i> ${repo.language}</span>` : ''}
                            </div>
                            <div class="tags">
                                <a href="${repo.html_url}" target="_blank" class="tag tag-primary">View Repo <i class="fas fa-external-link-alt" style="font-size: 0.7rem;"></i></a>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                    sliderStates[repo.id] = { current: 0, total: images.length };
                });
                
                await Promise.all(projectPromises);
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `<div class="error-msg"><p>Oops! Failed to load projects from GitHub.</p></div>`;
            }
        }

        function moveSlider(id, direction) {
            const state = sliderStates[id];
            state.current = (state.current + direction + state.total) % state.total;
            updateSliderUI(id);
        }

        function setSlider(id, index) {
            sliderStates[id].current = index;
            updateSliderUI(id);
        }

        function updateSliderUI(id) {
            const state = sliderStates[id];
            const container = document.querySelector(`#slider-${id} .slider-container`);
            const dots = document.querySelectorAll(`#slider-${id} .dot`);
            container.style.transform = `translateX(-${state.current * 100}%)`;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === state.current));
        }
    </script>
</body>

</html>
